<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Selenite Vastu</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-maroon: #822F2D;
            --primary-orange: #C47A3A;
            --bg-color: #F8F5EF;
            --text-dark: #2F2F2F;
            --text-light: #666666;
            --card-bg: #FFFFFF;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            color: var(--text-dark);
        }

        .admin-header {
            background-color: var(--primary-maroon);
            color: white;
            padding: 16px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .admin-header h1 {
            margin: 0;
            font-size: 1.5rem;
        }

        .container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .dashboard-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .dashboard-controls h2 {
            margin: 0;
        }

        .btn {
            background-color: var(--primary-orange);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-family: 'Outfit', sans-serif;
            font-weight: 500;
        }
        .btn:hover { background-color: #B0692B; }

        .table-container {
            background-color: var(--card-bg);
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            overflow: hidden;
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            text-align: left;
            padding: 16px;
            border-bottom: 1px solid #eee;
        }

        th {
            background-color: #fcfcfc;
            color: var(--text-light);
            font-weight: 600;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        tr:last-child td { border-bottom: none; }
        
        tr:hover {
            background-color: #fafafa;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: var(--text-light);
        }

        .badge {
            display: inline-block;
            padding: 6px 10px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 500;
            background-color: #F0E6D0;
            color: #A6732B;
        }
    </style>
</head>
<body>

    <div class="admin-header">
        <h1>Selenite Vastu Admin</h1>
        <a href="/" style="color: white; text-decoration: none; font-size: 0.9rem;">&larr; Back to Site</a>
    </div>

    <div class="container">
        <div class="dashboard-controls">
            <h2>Appointment Requests</h2>
            <button class="btn" id="refreshBtn">Refresh Data</button>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Date Received</th>
                        <th>Name</th>
                        <th>Contact Info</th>
                        <th>Physical Address</th>
                        <th>Interest / Service</th>
                        <th>Message</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <tr>
                        <td colspan="5" class="loading">Loading appointments...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script src="/admin.js"></script>
</body>
</html>
